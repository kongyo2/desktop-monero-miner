name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Created if it does not exist.'
        required: true
        type: string
      draft:
        description: 'Create the release as a draft'
        required: false
        type: boolean
        default: true
      prerelease:
        description: 'Mark the release as a prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build sources
        run: npm run build

      - name: Package application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: false
        run: npm run package:${{ matrix.platform }}

      - name: List artifacts
        shell: bash
        run: |
          ls -lah release || true
          find release -maxdepth 2 -type f -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-monero-miner-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 7
          path: |
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*-portable.exe
            release/latest*.yml

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p dist-release
          find artifacts -type f \( \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.tar.gz' -o \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name 'latest*.yml' \
          \) -exec cp -v {} dist-release/ \;
          ls -lah dist-release

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-release/*
